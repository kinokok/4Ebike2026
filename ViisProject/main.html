<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>舞鶴市 E-BikeProject</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 10px; font-family: sans-serif; background-color: #f5f5f5; }
        h1 { font-size: 20px; margin: 0 0 10px 0; }
        #map { width: 100%; height: 50vh; margin-top: 10px; border: 1px solid #ccc; }
        
        /* タブUIのスタイル */
        .tab-container { background: #fff; border: 1px solid #ccc; border-radius: 4px; overflow: hidden; }
        .tab-buttons { display: flex; background: #eee; border-bottom: 1px solid #ccc; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: none; cursor: pointer; font-weight: bold; font-size: 14px; }
        .tab-btn.active { background: #fff; color: #2196F3; border-bottom: 2px solid #2196F3; }
        
        .tab-content { display: none; padding: 15px; }
        .tab-content.active { display: block; }
        
        /* フォーム部品 */
        select, input[type="text"] { padding: 6px; font-size: 14px; margin-right: 5px; margin-bottom: 5px;}
        button.action-btn { padding: 6px 12px; cursor: pointer; background: #2196F3; color: #fff; border: none; border-radius: 3px; font-size: 13px;}
        button.clear-btn { padding: 6px 12px; cursor: pointer; background: #757575; color: #fff; border: none; border-radius: 3px; font-size: 13px;}
        
        /* ルートリストのスタイル */
        .route-item { border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 10px; }
        .route-item h4 { margin: 0 0 5px 0; font-size: 15px; }
        .route-meta { font-size: 12px; color: #666; margin-bottom: 5px; }
        
        #status { margin-top: 10px; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>舞鶴市 E-BikeProject</h1>
    
    <div class="tab-container">
        <!-- タブボタン -->
        <div class="tab-buttons">
            <button class="tab-btn active" onclick="switchTab('tab-search', this)">📍 スポットを探す</button>
            <button class="tab-btn" onclick="switchTab('tab-routes', this)">🚲 おすすめルート</button>
        </div>

        <!-- タブ1: スポット検索 -->
        <div id="tab-search" class="tab-content active">
            <select id="searchGroup">
                <option value="all">すべてのスポット</option>
                <optgroup label="飲食店（青ピン）">
                    <option value="meal">お食事</option>
                    <option value="alcohol_meat">お酒・肉</option>
                    <option value="cafe_sweets">カフェ</option>
                </optgroup>
                <optgroup label="観光・レジャー（赤ピン）">
                    <option value="sightseeing">観光・史跡</option>
                    <option value="activity">アクティビティ</option>
                </optgroup>
            </select>
            <input type="text" id="searchKeyword" placeholder="名称で絞り込み">
            <button class="action-btn" onclick="searchFromLocalDB()">この範囲で検索</button>
            <button class="clear-btn" onclick="clearMap()">クリア</button>
        </div>

        <!-- タブ2: ルート一覧 -->
        <div id="tab-routes" class="tab-content">
            <div id="route-list">データを読み込んでいます...</div>
        </div>
    </div>

    <div id="status">システム準備中...</div>
    <div id="map"></div>

    <!-- ライブラリの読み込み -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>
    
    <!-- ローカルJavaScriptデータの読み込み -->
    <script src="maizuru_spots.js"></script>
    <script src="routes.js"></script>
    
    <script>
        // --- 1. データベースと地図の初期化 ---
        const db = new Dexie("MaizuruTotalSpotsDB");
        db.version(1).stores({ spots: "id, name, group, genre, lat, lng, memo" });

        // 青ピン（飲食店用）
        const blueIcon = new L.Icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png',
            iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34]
        });

        // 赤ピン（観光・施設用）
        const redIcon = new L.Icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
            iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34]
        });

        let map = L.map('map').setView([35.4751, 135.3338], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let markerGroup = L.featureGroup().addTo(map);
        let routePolyline = null; 
        let routesData = [];      

        // --- 2. データ同期読み込み処理 ---
        window.addEventListener('load', async () => {
            const statusEl = document.getElementById('status');
            try {
                // maizuru_spots.js の変数 maizuruSpotsData が存在するかチェック
                if (typeof maizuruSpotsData === 'undefined' || typeof maizuruRoutesData === 'undefined') {
                    throw new Error("データファイル(maizuru_spots.js または routes.js)が正しく読み込めません。");
                }

                // Dexie(IndexedDB) にデータをインポート
                await db.spots.bulkPut(maizuruSpotsData);

                // ルートデータをグローバル変数に格納
                routesData = maizuruRoutesData;
                renderRouteList();

                statusEl.innerHTML = `✅ 準備完了（スポット ${await db.spots.count()}件 / ルート ${routesData.length}件）`;
                statusEl.style.color = "green";
            } catch (error) {
                statusEl.innerHTML = `❌ データ設定エラー: ${error.message}`;
                statusEl.style.color = "red";
            }
        });

        // --- アイコン判定関数 ---
        function getIconForSpot(spot) {
            const isFacility = (spot.group === 'sightseeing' || spot.group === 'activity');
            return isFacility ? redIcon : blueIcon;
        }

        // --- 3. タブ切り替え制御 ---
        function switchTab(tabId, btnElement) {
            clearMap();

            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            btnElement.classList.add('active');
            
            document.getElementById('status').innerHTML = "準備完了";
        }

        // --- 4. スポット検索機能 ---
        async function searchFromLocalDB() {
            clearMap();
            const group = document.getElementById('searchGroup').value;
            const keyword = document.getElementById('searchKeyword').value.trim();
            const currentBounds = map.getBounds();
            const statusEl = document.getElementById('status');

            let allSpots = await (group === 'all' ? db.spots.toArray() : db.spots.where('group').equals(group).toArray());
            
            let results = allSpots.filter(s => {
                if (!s.lat || !s.lng) return false;
                const inScreen = currentBounds.contains(L.latLng(s.lat, s.lng));
                const matchWord = (keyword === '' || s.name.includes(keyword));
                return inScreen && matchWord;
            });

            results.forEach(spot => {
                const popupContent = `
                    <div style="text-align:center; width:180px;">
                        <b style="font-size:14px;">${spot.name}</b><br>
                        ${spot.image ? `<img src="${spot.image}" style="width:100%; height:auto; border-radius:4px; margin-top:8px;">` : ''}
                        <div style="font-size:11px; color:#666; margin-top:5px;">${spot.genre}</div>
                    </div>
                `;
                const marker = L.marker([spot.lat, spot.lng], { icon: getIconForSpot(spot) }).bindPopup(popupContent);
                markerGroup.addLayer(marker);
            });

            statusEl.innerHTML = `✅ ${results.length}件のスポットを表示しました。`;
        }

        // --- 5. おすすめルート描画機能 ---
        function renderRouteList() {
            const listEl = document.getElementById('route-list');
            listEl.innerHTML = '';
            
            routesData.forEach(r => {
                const item = document.createElement('div');
                item.className = 'route-item';
                item.innerHTML = `
                    <h4>${r.title}</h4>
                    <div class="route-meta">距離: ${r.distance_km}km / 目安: ${r.time_min}分 / 難易度: ${r.difficulty}</div>
                    <div style="font-size:12px; margin-bottom:8px;">${r.description}</div>
                    <button class="action-btn" onclick="drawRoute('${r.route_id}')">地図にルートを表示</button>
                `;
                listEl.appendChild(item);
            });
        }

        async function drawRoute(routeId) {
            clearMap();
            const route = routesData.find(r => r.route_id === routeId);
            if (!route) return;

            const latlngs = [];
            const googleWaypoints = []; 

            for (let i = 0; i < route.waypoints.length; i++) {
                const spot = await db.spots.get(route.waypoints[i]);
                if (spot) {
                    latlngs.push([spot.lat, spot.lng]);
                    googleWaypoints.push(`${spot.lat},${spot.lng}`);
                    
                    const popupContent = `
                        <div style="text-align:center; width:180px;">
                            <b style="font-size:14px;">${i + 1}. ${spot.name}</b><br>
                            ${spot.image ? `<img src="${spot.image}" style="width:100%; height:auto; border-radius:4px; margin-top:8px;">` : ''}
                            <div style="font-size:11px; color:#666; margin-top:5px;">${spot.genre}</div>
                        </div>
                    `;
                    const marker = L.marker([spot.lat, spot.lng], { icon: getIconForSpot(spot) }).bindPopup(popupContent);
                    markerGroup.addLayer(marker);
                }
            }

            if (latlngs.length > 0) {
                routePolyline = L.polyline(latlngs, { color: '#E91E63', weight: 5, opacity: 0.8 }).addTo(map);
                map.fitBounds(routePolyline.getBounds(), { padding: [20, 20] });

                const origin = googleWaypoints.shift(); 
                const destination = googleWaypoints.pop() || origin; 
                const wpStr = googleWaypoints.join('|'); 
                
                let naviUrl = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}&travelmode=bicycling`;
                if (wpStr) naviUrl += `&waypoints=${wpStr}`;

                document.getElementById('status').innerHTML = `
                    ✅ ルート「${route.title}」を表示中。
                    <a href="${naviUrl}" target="_blank" style="background:#4CAF50; color:white; padding:4px 8px; text-decoration:none; border-radius:3px; margin-left:10px;">スマホでナビ開始</a>
                `;
            }
        }

        // --- 6. クリア処理 ---
        function clearMap() {
            markerGroup.clearLayers();
            if (routePolyline) {
                map.removeLayer(routePolyline);
                routePolyline = null;
            }
            document.getElementById('status').innerHTML = ""; 
        }
    </script>
</body>
</html>
