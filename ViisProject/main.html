<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>舞鶴市 E-BikeProject</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 10px; font-family: sans-serif; background-color: #f5f5f5; }
        h1 { font-size: 18px; margin: 0 0 6px 0; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 5px; }
        #map { width: 100%; height: 50vh; margin-top: 10px; border: 1px solid #ccc; }

        /* 言語切り替え */
        #lang-select { font-size: 12px; padding: 6px 10px; cursor: pointer; border: 1px solid #2196F3; border-radius: 4px; background: #fff; color: #2196F3; }
        #lang-select:focus { outline: none; }

        /* タブ */
        .tab-container { background: #fff; border: 1px solid #ccc; border-radius: 4px; overflow: hidden; }
        .tab-buttons { display: flex; background: #eee; border-bottom: 1px solid #ccc; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: none; cursor: pointer; font-weight: bold; font-size: 13px; }
        .tab-btn.active { background: #fff; color: #2196F3; border-bottom: 2px solid #2196F3; }
        .tab-content { display: none; padding: 12px; }
        .tab-content.active { display: block; }

        /* フォーム */
        select, input[type="text"] { padding: 6px; font-size: 14px; margin-right: 5px; margin-bottom: 5px; }
        button.action-btn { padding: 6px 12px; cursor: pointer; background: #2196F3; color: #fff; border: none; border-radius: 3px; font-size: 13px; }
        button.clear-btn { padding: 6px 12px; cursor: pointer; background: #757575; color: #fff; border: none; border-radius: 3px; font-size: 13px; }

        /* ルートリスト */
        .route-item { border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 10px; }
        .route-item h4 { margin: 0 0 5px 0; font-size: 15px; }
        .route-meta { font-size: 12px; color: #666; margin-bottom: 5px; }

        /* ルートジェネレーター */
        .gen-btn { width: 100%; padding: 10px; font-size: 14px; font-weight: bold; cursor: pointer; background: #2196F3; color: #fff; border: none; border-radius: 4px; margin-bottom: 10px; }
        .maps-link { display: inline-block; background: #4CAF50; color: #fff; padding: 6px 12px; border-radius: 4px; text-decoration: none; font-size: 13px; font-weight: bold; }
        .maps-link:hover { background: #388E3C; }

        #status { margin-top: 8px; font-size: 13px; font-weight: bold; }

        /* 現在地ボタン */
        #map-wrap { position: relative; }
        #locate-btn {
            position: absolute;
            bottom: 80px;
            right: 10px;
            z-index: 1000;
            background: #fff;
            border: 2px solid #ccc;
            border-radius: 4px;
            width: 34px;
            height: 34px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 1px 5px rgba(0,0,0,0.3);
        }
        #locate-btn:hover { background: #f0f0f0; }
        #locate-btn.tracking { border-color: #2196F3; color: #2196F3; }

        @media (max-width: 640px) {
            body { padding: 8px; }
            h1 { flex-direction: column; align-items: flex-start; gap: 8px; }
            .tab-buttons { flex-wrap: wrap; }
            .tab-btn { flex: 1 1 100%; text-align: left; }
            .route-item, .tab-content { padding: 0; }
            .action-btn, .clear-btn, .gen-btn, .maps-link { width: 100%; }
            #map { height: 45vh; }
            #locate-btn { bottom: 70px; right: 8px; }
        }
    </style>
</head>
<body>

<h1>
    <span id="t-title" data-i18n-key="title">🚲 舞鶴市 E-BikeProject</span>
    <select id="lang-select" onchange="setLang(this.value)">
        <option value="ja">日本語</option>
        <option value="en">English</option>
        <option value="ko">한국어</option>
        <option value="zh">中文</option>
    </select>
</h1>

<div class="tab-container">
    <div class="tab-buttons">
        <button class="tab-btn active" onclick="switchTab('tab-search', this)" id="tb-search">📍 <span id="t-tab1" data-i18n-key="tab_search">スポットを探す</span></button>
        <button class="tab-btn" onclick="switchTab('tab-routes', this)" id="tb-routes">🚲 <span id="t-tab2" data-i18n-key="tab_routes">おすすめルート</span></button>
        <button class="tab-btn" onclick="switchTab('tab-gen', this)" id="tb-gen">🎯 <span id="t-tab3" data-i18n-key="tab_gen">ルート生成</span><span id="routeplan-badge" style="display:none;background:#E91E63;color:white;border-radius:10px;padding:1px 6px;font-size:11px;margin-left:4px">0</span></button>
    </div>

    <div id="tab-search" class="tab-content active">
        <select id="searchGroup">
            <option value="all" data-ja="すべてのスポット" data-en="All Spots" data-ko="전체 스팟" data-zh="所有景点">すべてのスポット</option>
            <optgroup id="optgroup-restaurant" data-ja="飲食店（青ピン）" data-en="Restaurants (Blue)" data-ko="음식점 (파란 핀)" data-zh="餐饮店（蓝色）" label="飲食店（青ピン）/ Restaurants (Blue)">
                <option value="meal" data-ja="お食事" data-en="Dining" data-ko="식사" data-zh="餐饮">お食事</option>
                <option value="alcohol_meat" data-ja="お酒・肉" data-en="Drinks & Meat" data-ko="주류·고기" data-zh="酒水·肉类">お酒・肉</option>
                <option value="cafe_sweets" data-ja="カフェ" data-en="Cafe" data-ko="카페" data-zh="咖啡馆">カフェ</option>
            </optgroup>
            <optgroup id="optgroup-sightseeing" data-ja="観光・レジャー（赤ピン）" data-en="Sightseeing (Red)" data-ko="관광·레저 (빨간 핀)" data-zh="观光·休闲（红色）" label="観光・レジャー（赤ピン）/ Sightseeing (Red)">
                <option value="sightseeing" data-ja="観光・史跡" data-en="Sightseeing" data-ko="관광·사적" data-zh="观光·史迹">観光・史跡</option>
                <option value="activity" data-ja="アクティビティ" data-en="Activity" data-ko="액티비티" data-zh="活동">アクティビティ</option>
            </optgroup>
        </select>
        <input type="text" id="searchKeyword" data-i18n-placeholder="search_placeholder">
        <button class="action-btn" onclick="searchFromLocalDB()" id="t-search-btn" data-i18n-key="search">この範囲で検索</button>
        <button class="clear-btn" onclick="clearMap()" id="t-clear-btn" data-i18n-key="clear">クリア</button>
    </div>

    <div id="tab-routes" class="tab-content">
        <div id="route-list"><span id="t-loading" data-i18n-key="loading">データを読み込んでいます...</span></div>
        <div style="margin-top: 25px; border-top: 2px dashed #ddd; padding-top: 15px;">
            <h3 style="font-size: 15px; margin: 0 0 10px 0; color: #FF8F00; display: flex; align-items: center; gap: 5px;">
                📸 <span id="t-photo-title">おすすめ撮影スポット</span>
            </h3>
            <div id="photo-spot-list" style="max-height: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;"></div>
        </div>
    </div>

    <div id="tab-gen" class="tab-content">
        <p id="routeplan-hint" style="font-size:12px;color:#666;margin:0 0 8px 0" data-i18n-key="routeplan_hint">📍 タブ1でスポットのポップアップから「ルートに追加」で選んでください</p>
        <div id="routeplan-empty" style="color:#999;font-size:13px;margin-bottom:10px" data-i18n-key="routeplan_empty">まだスポットが選ばれていません</div>
        <div id="routeplan-list" style="margin-bottom:12px"></div>

        <div style="font-size:13px;font-weight:bold;margin-bottom:6px" data-i18n-key="auto_gen_genre">自動補完するジャンル</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px">
            <label><input type="checkbox" class="genre-check" value="meal" checked> <span data-i18n-key="meal">飲食</span></label>
            <label><input type="checkbox" class="genre-check" value="cafe_sweets" checked> <span data-i18n-key="cafe_sweets">カフェ</span></label>
            <label><input type="checkbox" class="genre-check" value="sightseeing" checked> <span data-i18n-key="sightseeing">観光</span></label>
            <label><input type="checkbox" class="genre-check" value="activity"> <span data-i18n-key="activity">公園</span></label>
            <label><input type="checkbox" class="genre-check" value="alcohol_meat"> <span data-i18n-key="alcohol_meat">お酒・肉</span></label>
        </div>

        <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap">
            <label style="font-size:13px;font-weight:bold" id="t-stops-label" data-i18n-key="stop_label">立ち寄り数</label>
            <input type="range" id="spots-slider" min="2" max="6" value="3" step="1"
                   oninput="document.getElementById('spots-val').textContent=this.value">
            <span id="spots-val" style="font-weight:bold">3</span> <span id="t-stops-unit" data-i18n-key="stops">箇所</span>
        </div>

        <button class="gen-btn" id="gen-btn" onclick="generateRoute()" data-i18n-key="route_gen">ルートを生成する</button>
        <div id="gen-result" style="display:none;background:#f9f9f9;border:1px solid #ddd;border-radius:6px;padding:10px"></div>
    </div>
</div>

<div id="status" data-i18n-key="status_init">システム準備中... / Loading...</div>
<div id="map-wrap">
    <div id="map"></div>
    <button id="locate-btn" data-i18n-title="locate_btn">📍</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>
<script src="maizuru_spots.js"></script>
<script src="routes.js"></script>

<script>
// ===== 言語管理 =====
const supportedLangs = ['ja', 'en', 'ko', 'zh'];
let lang = localStorage.getItem('lang');
if (!supportedLangs.includes(lang)) lang = 'ja';

const translations = {
    title: { ja:'🚲 舞鶴市 E-BikeProject', en:'🚲 Maizuru City E-Bike Project', ko:'🚲 마이즈루 E-Bike 프로젝트', zh:'🚲 舞鹤市 E-Bike Project' },
    tab_search: { ja:'スポットを探す', en:'Find Spots', ko:'스팟 찾기', zh:'搜索景点' },
    tab_routes: { ja:'おすすめルート', en:'Routes', ko:'추천 코스', zh:'推荐路线' },
    tab_gen: { ja:'ルート生成', en:'Route Generator', ko:'경로 생성', zh:'路线生成' },
    search: { ja:'この範囲で検索', en:'Search this area', ko:'이 영역에서 검색', zh:'在此范围内搜索' },
    clear: { ja:'クリア', en:'Clear', ko:'초기화', zh:'清除' },
    search_placeholder: { ja:'名称で絞り込み', en:'Search by name', ko:'이름으로 검색', zh:'按名称搜索' },
    routeplan_hint: { ja:'📍 タブ1でスポットのポップアップから「ルートに追加」で選んでください', en:'📍 Select spots from the popup in Tab 1 and add them to the route.', ko:'📍 탭1의 팝업에서 스팟을 선택하고 경로에 추가하세요.', zh:'📍 请在标签1的弹出窗口中选择景点并添加到路线。' },
    routeplan_empty: { ja:'まだスポットが選ばれていません', en:'No spots selected yet', ko:'아직 선택된 스팟이 없습니다', zh:'尚未选择景点' },
    auto_gen_genre: { ja:'自動補完するジャンル', en:'Auto-complete genres', ko:'자동 완성 장르', zh:'自动补全类型' },
    meal: { ja:'飲食', en:'Dining', ko:'식사', zh:'餐饮' },
    cafe_sweets: { ja:'カフェ', en:'Cafe', ko:'카페', zh:'咖啡馆' },
    sightseeing: { ja:'観光', en:'Sightseeing', ko:'관광', zh:'观光' },
    activity: { ja:'公園', en:'Activity', ko:'액티비티', zh:'活动' },
    alcohol_meat: { ja:'お酒・肉', en:'Drinks & Meat', ko:'주류·고기', zh:'酒水·肉类' },
    stop_label: { ja:'立ち寄り数', en:'Stops', ko:'경유 수', zh:'停靠数' },
    stops: { ja:'箇所', en:'stops', ko:'곳', zh:'处' },
    route_gen: { ja:'ルートを生成する', en:'Generate Route', ko:'경로 생성', zh:'生成路线' },
    loading: { ja:'データを読み込んでいます...', en:'Loading...', ko:'데이터를 불러오는 중...', zh:'正在加载数据...' },
    ready: { ja:'準備完了', en:'Ready', ko:'준비 완료', zh:'准备就绪' },
    data_error: { ja:'データファイルが読み込めません', en:'Data files could not be loaded', ko:'데이터 파일을 불러올 수 없습니다', zh:'无法加载数据文件' },
    spots_found: { ja:'✅ {count}件表示', en:'✅ {count} spots found', ko:'✅ {count}개 표시됨', zh:'✅ 显示 {count} 个景点' },
    distance: { ja:'距離', en:'Distance', ko:'거리', zh:'距离' },
    est: { ja:'目安', en:'Est.', ko:'예상', zh:'预计' },
    min: { ja:'分', en:'min', ko:'분', zh:'分钟' },
    level: { ja:'難易度', en:'Level', ko:'난이도', zh:'难度' },
    show_on_map: { ja:'地図にルートを表示', en:'Show on Map', ko:'지도に表示', zh:'在地图上显示路线' },
    view_info: { ja:'📖 説明を見る', en:'📖 View Info', ko:'📖 설명 보기', zh:'📖 查看说明' },
    navigate: { ja:'スマホでナビ開始', en:'Navigate', ko:'내비게이션 시작', zh:'开始导航' },
    already_added: { ja:'すでに追加済みです', en:'Already added', ko:'이미 추가됨', zh:'已添加' },
    calculating: { ja:'計算中...', en:'Calculating...', ko:'계산 중...', zh:'计算中...' },
    regenerate: { ja:'再生成する', en:'Regenerate', ko:'다시 생성', zh:'重新生成' },
    your_location: { ja:'現在地', en:'Your Location', ko:'현재 위치', zh:'您的位置' },
    geolocation_unsupported: { ja:'位置情報非対応のブラウザです', en:'Geolocation not supported', ko:'위치 정보가 지원되지 않는 브라우저입니다', zh:'浏览器不支持定位' },
    tracking_location: { ja:'現在地を追跡中', en:'Tracking location', ko:'위치 추적 중', zh:'正在追踪位置' },
    locate_btn: { ja:'現在地', en:'My Location', ko:'내 위치', zh:'当前位置' },
    status_init: { ja:'準備完了', en:'Ready', ko:'준비 완료', zh:'准备就绪' },
    google_maps_nav: { ja:'Google マップでナビ開始', en:'Open Google Maps', ko:'Google 지도에서 내비게이션 시작', zh:'在 Google 地图中导航' },
    route_summary: { ja:'約 {dist} km ／ 目安 {time} 分 ／ {count} スポット', en:'Approx. {dist} km / ~{time} min / {count} spots', ko:'약 {dist} km / 약 {time} 분 / {count} 스팟', zh:'约 {dist} 公里 / 预计 {time} 分钟 / {count} 个景点' },
    route_added: { ja:'ルートに追加', en:'Add to Route', ko:'경로에 추가', zh:'添加到路线' },
    street_view: { ja:'ストリートビュー', en:'Street View', ko:'스트리트 뷰', zh:'街景' },
    photo_spot_title: { ja:'📸 おすすめ撮影スポット', en:'📸 Recommended Photo Spot', ko:'📸 추천 촬영 스팟', zh:'📸 推荐拍照点' },
    photo_spot_badge: { ja:'絶景ポイント', en:'Scenic Point', ko:'절경 포인트', zh:'绝佳景点' },
    photo_spot_view: { ja:'📍 地図で見る', en:'📍 View on Map', ko:'📍 지도에서 보기', zh:'📍 在地图上查看' }
};

function translate(key, params = {}) {
    const value = translations[key] && translations[key][lang] ? translations[key][lang] : key;
    return Object.keys(params).reduce((text, param) => text.replace(new RegExp(`\\{${param}}`, 'g'), params[param]), value);
}

function setLang(value) {
    if (!supportedLangs.includes(value)) return;
    lang = value;
    localStorage.setItem('lang', lang);
    document.getElementById('lang-select').value = lang;
    applyLang();
}

function updateSelectLabels() {
    document.querySelectorAll('#searchGroup option').forEach(option => {
        const datasetLabel = option.dataset[lang];
        option.textContent = datasetLabel || option.textContent;
    });
    document.querySelectorAll('#searchGroup optgroup').forEach(group => {
        const datasetLabel = group.dataset[lang];
        if (datasetLabel) group.label = datasetLabel;
    });
}

function applyLang() {
    document.documentElement.lang = lang;
    document.title = translate('title');
    document.getElementById('t-title').textContent = translate('title');
    document.getElementById('t-tab1').textContent = translate('tab_search');
    document.getElementById('t-tab2').textContent = translate('tab_routes');
    document.getElementById('t-tab3').textContent = translate('tab_gen');
    document.getElementById('t-search-btn').textContent = translate('search');
    document.getElementById('t-clear-btn').textContent = translate('clear');
    document.getElementById('routeplan-hint').textContent = translate('routeplan_hint');
    document.getElementById('routeplan-empty').textContent = translate('routeplan_empty');
    document.getElementById('t-stops-label').textContent = translate('stop_label');
    document.getElementById('t-stops-unit').textContent = translate('stops');
    document.getElementById('gen-btn').textContent = translate('route_gen');
    document.getElementById('searchKeyword').placeholder = translate('search_placeholder');
    document.getElementById('locate-btn').title = translate('locate_btn');
    document.getElementById('status').textContent = translate('status_init');
    document.querySelectorAll('[data-i18n-key]').forEach(el => {
        const key = el.dataset.i18nKey;
        if (key && translations[key]) el.textContent = translate(key);
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.dataset.i18nPlaceholder;
        if (key && translations[key]) el.placeholder = translate(key);
    });
    document.querySelectorAll('[data-i18n-title]').forEach(el => {
        const key = el.dataset.i18nTitle;
        if (key && translations[key]) el.title = translate(key);
    });
    updateSelectLabels();
    renderRouteList();
    renderRoutePlan();
    renderPhotoSpotList();
    if (currentRouteId) drawRoute(currentRouteId);
}

// ★ fallback: name(ja基準) → name_en の順（修正済み）
function getSpotField(spot, base) {
    return spot[`${base}_${lang}`] || spot[base] || spot[`${base}_en`] || '';
}

function getRouteField(route, base) {
    return route[`${base}_${lang}`] || route[base] || route[`${base}_en`] || '';
}

function getGroupLabel(group) {
    return translations[group] ? translate(group) : group || '';
}

// ===== DB・地図初期化 =====
const db = new Dexie("MaizuruTotalSpotsDB");
db.version(5).stores({ spots: "id, name, name_en, name_ko, name_zh, group, genre, lat, lng, image, memo, memo_en, memo_ko, memo_zh" });

const blueIcon = new L.Icon({
    iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png',
    iconSize: [25,41], iconAnchor: [12,41], popupAnchor: [1,-34]
});
const redIcon = new L.Icon({
    iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
    iconSize: [25,41], iconAnchor: [12,41], popupAnchor: [1,-34]
});

const map = L.map('map').setView([35.4751, 135.3338], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let markerGroup = L.featureGroup().addTo(map);
let routePolyline = null;
let routesData = [];
let currentRouteId = null;

window.addEventListener('load', async () => {
    const statusEl = document.getElementById('status');
    try {
        if (typeof maizuruSpotsData === 'undefined' || typeof maizuruRoutesData === 'undefined') {
            throw new Error(translate('data_error'));
        }
        await db.spots.bulkPut(maizuruSpotsData);
        routesData = maizuruRoutesData;
        document.getElementById('lang-select').value = lang;
        applyLang();
        const cnt = await db.spots.count();
        statusEl.innerHTML = translate('spots_found', { count: cnt });
        statusEl.style.color = 'green';
    } catch(e) {
        statusEl.innerHTML = `❌ ${e.message}`;
        statusEl.style.color = 'red';
    }
    startLocationTracking();
});

function getIconForSpot(spot) {
    return (spot.group === 'sightseeing' || spot.group === 'activity') ? redIcon : blueIcon;
}

function getNumberedIcon(spot, num) {
    const isRed = (spot.group === 'sightseeing' || spot.group === 'activity');
    const iconUrl = isRed
        ? 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png'
        : 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png';
    const badgeColor = isRed ? '#C62828' : '#1565C0';
    return L.divIcon({
        className: '',
        html: `<div style="position:relative;width:25px;height:41px;">
            <img src="${iconUrl}" style="width:25px;height:41px;">

// ===== Google Maps URL生成 =====
function buildMapsUrl(coordsArray) {
    const points = coordsArray.map(coord => {
        const [lat, lng] = coord.split(',');
        return `${parseFloat(lat).toFixed(7)},${parseFloat(lng).toFixed(7)}`;
    });
    return `https://www.google.com/maps/dir/${points.join('/')}/@35.4751,135.3338,12z/data=!3m1!4b1!4m2!4m1!3e1`;
}

function openMaps(url) {
    const w = window.open('about:blank', '_blank');
    setTimeout(function() { w.location.href = url; }, 100);
}

async function searchFromLocalDB() {
    clearMap();
    const group = document.getElementById('searchGroup').value;
    const keyword = document.getElementById('searchKeyword').value.trim();
    const bounds = map.getBounds();
    let all = await (group === 'all' ? db.spots.toArray() : db.spots.where('group').equals(group).toArray());
    const matchSpotKeyword = (spot, keywordText) => {
        if (!keywordText) return true;
        const low = keywordText.toLowerCase();
        return ['name','name_en','name_ko','name_zh'].some(field => spot[field] && spot[field].toLowerCase().includes(low));
    };
    let results = all.filter(s => {
        if (!s.lat || !s.lng) return false;
        return bounds.contains(L.latLng(s.lat, s.lng)) && matchSpotKeyword(s, keyword);

    results.forEach(spot => {

// ===== 距離計算・ソート =====
function haversine(a, b) {
    const R = 6371, dLat = (b.lat - a.lat) * Math.PI / 180, dLng = (b.lng - a.lng) * Math.PI / 180;
    const s = Math.sin(dLat/2)**2 + Math.cos(a.lat*Math.PI/180) * Math.cos(b.lat*Math.PI/180) * Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1-s));
}

function sortByNearest(spots) {
    const start = locationMarker
        ? { lat: locationMarker.getLatLng().lat, lng: locationMarker.getLatLng().lng }
        : spots[0];
    const result = [], remaining = [...spots];
    let current = start;
    while (remaining.length) {
        let minD = Infinity, minI = 0;
        remaining.forEach((s, i) => { const d = haversine(current, s); if (d < minD) { minD = d; minI = i; } });
        result.push(remaining.splice(minI, 1)[0]);
        current = result[result.length - 1];
    }
    return result;
}

// ===== ルート生成 =====
async function generateRoute() {
    const nStops = parseInt(document.getElementById('spots-slider').value);
    const resultEl = document.getElementById('gen-result');
    const genBtn = document.getElementById('gen-btn');
    resultEl.style.display = 'block';
    resultEl.innerHTML = translate('calculating');

    const fixed = [...routePlanSpots];
    const remaining = Math.max(0, nStops - fixed.length);
    const checkedGenres = [...document.querySelectorAll('.genre-check:checked')].map(el => el.value);

    let extras = [];
    if (remaining > 0) {
        const allSpots = await db.spots.toArray();
        const fixedIds = new Set(fixed.map(s => s.id));
        const pool = allSpots.filter(s => s.lat && s.lng && !fixedIds.has(s.id) && checkedGenres.includes(s.group));
        const center = locationMarker
            ? { lat: locationMarker.getLatLng().lat, lng: locationMarker.getLatLng().lng }
            : fixed.length ? { lat: fixed[0].lat, lng: fixed[0].lng }
            : { lat: 35.4751, lng: 135.3338 };
        const sorted = pool.sort((a, b) => haversine(center, a) - haversine(center, b));
        const groupPicked = {};
        for (const spot of sorted) {
            if (extras.length >= remaining) break;
            if (groupPicked[spot.group]) continue;
            extras.push(spot);
            groupPicked[spot.group] = true;
        }
        for (const spot of sorted) {
            if (extras.length >= remaining) break;
            if (!extras.find(s => s.id === spot.id)) extras.push(spot);
        }
    }

    const best = sortByNearest([...fixed, ...extras]);
    let totalDist = 0;
    for (let i = 1; i < best.length; i++) totalDist += haversine(best[i-1], best[i]);
    const timeMin = Math.round(totalDist / 12 * 60 + best.length * 15);

    const wpCoords = best.map(s => `${s.lat},${s.lng}`);
    // ★ 現在地を出発点として追加
    const origin = locationMarker
        ? [`${locationMarker.getLatLng().lat},${locationMarker.getLatLng().lng}`]
        : [];
    const mapsUrl = buildMapsUrl([...origin, ...wpCoords]);

    const chips = best.map((s, i) => {
        const isFixed = routePlanSpots.find(f => f.id === s.id);
        const name = getSpotField(s, 'name');
        return `<span style="display:inline-block;background:${isFixed ? '#FCE4EC' : '#E3F2FD'};border:1px solid ${isFixed ? '#E91E63' : '#90CAF9'};border-radius:12px;padding:2px 8px;font-size:11px;margin:2px;color:${isFixed ? '#C62828' : '#1565C0'}">${i+1}. ${name}${isFixed ? ' 📌' : ''}</span>`;
    }).join('');

    let spotsCardsHtml = '';
    best.forEach((s, i) => {
        const isFixed = routePlanSpots.find(f => f.id === s.id);
        const name = getSpotField(s, 'name');
        const memo = getSpotField(s, 'memo');
        spotsCardsHtml += `
        <div style="border:1px solid #ddd;border-radius:8px;margin-bottom:10px;overflow:hidden;background:#fff;text-align:left">
            <div style="display:flex;align-items:center;padding:10px;gap:8px">
                <span style="background:${isFixed ? '#E91E63' : '#2196F3'};color:white;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;flex-shrink:0">${i+1}</span>
                <span style="flex:1;font-size:14px;font-weight:bold">${name}${isFixed ? ' 📌' : ''}</span>
                <span style="font-size:11px;color:#999">${getGroupLabel(s.group)}</span>
            </div>
            <div style="padding:0 10px 10px 10px;border-top:1px solid #f0f0f0">
                ${s.image ? `<img src="${s.image}" style="width:100%;border-radius:6px;margin-bottom:6px;margin-top:8px">` : ''}
                ${memo ? `<p style="font-size:12px;color:#555;margin:0">${memo}</p>` : ''}
            </div>
        </div>`;
    });

    window._genMapsUrl = mapsUrl;
    resultEl.innerHTML = `
        <div style="font-size:12px;color:#666;margin-bottom:8px">${translate('route_summary', { dist: totalDist.toFixed(1), time: timeMin, count: best.length })}</div>
        <div style="margin-bottom:10px">${chips}</div>
        <div style="margin-bottom:12px">${spotsCardsHtml}</div>
        <button onclick="openMaps(window._genMapsUrl)" style="display:block;width:100%;text-align:center;background:#4CAF50;color:#fff;padding:10px;border-radius:4px;border:none;font-size:14px;font-weight:bold;cursor:pointer">${translate('google_maps_nav')}</button>
    `;

    genBtn.textContent = '🔄 ' + translate('regenerate');

    clearMap();
    best.forEach((s, i) => {
        const name = getSpotField(s, 'name');
        const memo = getSpotField(s, 'memo');
        const popupId = `gen-memo-${s.id}-${i}`;
        const isFixed = routePlanSpots.find(f => f.id === s.id);
        const streetViewUrl = `https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${s.lat},${s.lng}`;
        const popup = `<div style="text-align:center;width:180px">
            <b>${i+1}. ${name}${isFixed ? ' 📌' : ''}</b><br>
            ${s.image ? `<img src="${s.image}" style="width:100%;height:auto;border-radius:4px;margin-top:6px">` : ''}
            <a href="${streetViewUrl}" target="_blank" style="display:block;margin-top:6px;padding:4px 0;font-size:11px;background:#e67e22;color:white;text-decoration:none;border-radius:3px;font-weight:bold;">📷 ${translate('street_view')}</a>
            ${memo ? `<button onclick="document.getElementById('${popupId}').style.display='block';this.style.display='none'" style="margin-top:6px;padding:4px 8px;font-size:11px;background:#2196F3;color:white;border:none;border-radius:3px;cursor:pointer;width:100%">${translate('view_info')}</button><p id="${popupId}" style="display:none;font-size:11px;color:#555;text-align:left;margin:8px 0 0 0;background:#f9f9f9;padding:6px;border-radius:3px;border-left:3px solid #2196F3">${memo}</p>` : ''}

    routePolyline = L.polyline(best.map(s => [s.lat, s.lng]), { color:'#E91E63', weight:5, opacity:0.8 }).addTo(map);
    map.fitBounds(routePolyline.getBounds(), { padding:[20,20] });
}

// ===== 現在地追跡 =====
let locationWatchId = null;
let locationMarker = null;
let locationCircle = null;
const locateBtn = document.getElementById('locate-btn');

const locationIcon = L.divIcon({
    className: '',
    html: '<div style="width:16px;height:16px;background:#2196F3;border:3px solid #fff;border-radius:50%;box-shadow:0 0 6px rgba(33,150,243,0.8);"></div>',

function updateLocationOnMap(pos) {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    const accuracy = pos.coords.accuracy;
    if (!locationMarker) {
        locationMarker = L.marker([lat, lng], { icon: locationIcon, zIndexOffset: 1000 })
            .addTo(map).bindPopup(translate('your_location'));
        locationCircle = L.circle([lat, lng], { radius: accuracy, color: '#2196F3', fillColor: '#2196F3', fillOpacity: 0.1, weight: 1 }).addTo(map);
        map.setView([lat, lng], 14);
    } else {
        locationMarker.setLatLng([lat, lng]);
        locationCircle.setLatLng([lat, lng]).setRadius(accuracy);
    }
}

function startLocationTracking() {
    if (!navigator.geolocation) { alert(translate('geolocation_unsupported')); return; }
    navigator.geolocation.getCurrentPosition(pos => {
        updateLocationOnMap(pos);
        locationWatchId = navigator.geolocation.watchPosition(updateLocationOnMap, err => console.warn(err.message), {
            enableHighAccuracy: true, maximumAge: 5000, timeout: 10000
        });
        locateBtn.classList.add('tracking');
        locateBtn.title = translate('tracking_location');
    }, err => console.warn(err.message), { enableHighAccuracy: true });
}

locateBtn.addEventListener('click', () => {
    if (locationMarker) { map.setView(locationMarker.getLatLng(), 15); }
    else { startLocationTracking(); }
});
</script>
</body>
