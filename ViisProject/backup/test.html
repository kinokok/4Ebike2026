<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>舞鶴限定・観光アクティビティ抽出ツール</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; }
        #map { width: 100%; height: 500px; margin-top: 15px; border: 1px solid #ccc; }
        .panel { background-color: #f5f5f5; padding: 15px; border-radius: 5px; margin-bottom: 15px; border-left: 5px solid #E91E63; }
        button { padding: 10px 18px; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold; margin-right: 10px; }
        button:disabled { background-color: #ccc !important; cursor: not-allowed; }
        .btn-pink { background-color: #E91E63; } .btn-pink:hover { background-color: #c2185b; }
        .btn-orange { background-color: #FF9800; } .btn-orange:hover { background-color: #e68a00; }
        .status { margin-top: 10px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>舞鶴限定 観光名所＆アクティビティ抽出ツール</h1>
    
    <div class="panel">
        <h3 style="margin:0 0 10px 0;">自転車圏内（西舞鶴〜東舞鶴〜松尾寺エリア）のみ抽出</h3>
        <div>
            <button id="fetchBtn" class="btn-pink" onclick="fetchTourismData()">スポットを取得してプレビュー</button>
            <button id="exportBtn" class="btn-orange" onclick="exportToJson()" disabled>maizuru-data2.json として保存</button>
        </div>
        <div id="status" class="status" style="color: #666;">ボタンを押すと指定エリア内のデータをスキャンします</div>
    </div>
    
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 地図の表示範囲（スクロール制限用は少し広めに残す）
        const viewBounds = [[35.35, 135.20], [35.55, 135.55]];
        const maizuruCenter = [35.4751, 135.3338];
        
        let map = L.map('map', { center: maizuruCenter, zoom: 12, maxBounds: viewBounds });
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);
        
        let markerGroup = L.featureGroup().addTo(map);
        let extractedData = [];

        async function fetchTourismData() {
            const statusEl = document.getElementById('status');
            const fetchBtn = document.getElementById('fetchBtn');
            const exportBtn = document.getElementById('exportBtn');
            
            fetchBtn.disabled = true;
            exportBtn.disabled = true;
            statusEl.innerHTML = "🔄 抽出サーバー(Overpass API)から限定エリアを検索中...";
            statusEl.style.color = "blue";
            markerGroup.clearLayers();
            extractedData = [];

            // 検索範囲を厳格に絞り込み（西舞鶴〜東舞鶴〜松尾寺エリア限定）
            // 宮津・綾部・大井町を含まないボックス座標: 南西(35.42, 135.30) 〜 北東(35.52, 135.46)
            const overpassQuery = `
                [out:json][timeout:30];
                (
                  nwr["tourism"](35.42,135.30,35.52,135.46);
                  nwr["historic"](35.42,135.30,35.52,135.46);
                  nwr["leisure"~"park|nature_reserve|resort|marina"](35.42,135.30,35.52,135.46);
                );
                out center;
            `;

            const apiUrl = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(overpassQuery)}`;

            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error(`API通信エラー (${response.status})`);
                const data = await response.json();

                const uniqueNames = new Set();

                data.elements.forEach(el => {
                    if (el.tags && el.tags.name) {
                        // 経度(lon)と緯度(lat)の取得を完全に修正済み
                        const lat = el.lat || (el.center && el.center.lat);
                        const lng = el.lon || (el.center && el.center.lon);
                        
                        // 宿泊施設は除外
                        const isHotel = el.tags.tourism && el.tags.tourism.match(/hotel|motel|hostel|guest_ point|guest_house|chalet/);
                        
                        if (lat && lng && !isHotel) {
                            const name = el.tags.name;
                            
                            if (!uniqueNames.has(name)) {
                                uniqueNames.add(name);

                                let group = "sightseeing";
                                let genreName = "観光スポット・史跡";
                                
                                if (el.tags.leisure) {
                                    group = "activity";
                                    genreName = "アクティビティ・公園";
                                } else if (el.tags.tourism === "museum" || el.tags.tourism === "gallery") {
                                    genreName = "博物館・美術館";
                                } else if (el.tags.tourism === "viewpoint") {
                                    genreName = "展望台・景勝地";
                                }

                                const spot = {
                                    id: `${el.type}_${el.id}`,
                                    name: name,
                                    group: group,
                                    genre: genreName,
                                    lat: parseFloat(lat),
                                    lng: parseFloat(lng)
                                };

                                extractedData.push(spot);

                                const marker = L.marker([spot.lat, spot.lng])
                                    .bindPopup(`<strong>${spot.name}</strong><br><small>${spot.genre}</small>`);
                                markerGroup.addLayer(marker);
                            }
                        }
                    }
                });

                if (extractedData.length > 0) {
                    statusEl.innerHTML = `✅ 抽出完了：舞鶴エリア限定で <strong>${extractedData.length}</strong> 件の施設を取得しました！保存してください。`;
                    statusEl.style.color = "green";
                    exportBtn.disabled = false;
                    map.fitBounds(markerGroup.getBounds().pad(0.1));
                } else {
                    statusEl.innerHTML = "⚠️ エリア内に該当するデータが見つかりませんでした。";
                    statusEl.style.color = "orange";
                }

            } catch (error) {
                console.error(error);
                statusEl.innerHTML = `❌ エラーが発生しました: ${error.message}`;
                statusEl.style.color = "red";
            } finally {
                fetchBtn.disabled = false;
            }
        }

        function exportToJson() {
            if (extractedData.length === 0) return;
            
            const jsonString = JSON.stringify(extractedData, null, 2);
            const blob = new Blob([jsonString], { type: "application/json" });
            const filename = "maizuru-data2.json";

            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            const statusEl = document.getElementById('status');
            statusEl.innerHTML += `<br>💾 <strong>${filename}</strong> をダウンロードしました。`;
        }
    </script>
</body>
</html>
