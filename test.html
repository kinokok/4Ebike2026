<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>舞鶴市 全飲食店プロット（試験用）</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: sans-serif;
        }
        
        #map {
            width: 100%;
            height: 600px;
            margin-top: 15px;
            border: 1px solid #ccc;
        }
        
        .control-panel {
            background-color: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        
        button {
            padding: 10px 20px;
            background-color: #e91e63;
            color: white;
            font-size: 15px;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }
        
        button:hover {
            background-color: #d81b60;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        
        #status {
            margin-top: 10px;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>舞鶴市 ホットペッパー全店舗プロットマップ</h1>
    
    <div class="control-panel">
        <button id="loadBtn" onclick="loadAllMaizuruShops()">全店舗データを読み込む</button>
        <button onclick="clearMarkers()" style="background-color: #777;">クリア</button>
        <div id="status">ボタンを押すと取得を開始します...</div>
    </div>
    
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // =====================================================
        // API設定
        // =====================================================
        const HOTPEPPER_API_KEY = '545ea2faea49bae3'; // TODO: 正規のAPIキーを入力してください
        
        // 舞鶴市全体の境界と中心
        const bounds = [[35.28, 135.15], [35.61, 135.62]];
        const maizuruCenter = [35.4751, 135.3338];
        
        // 網羅のための2大検索拠点（西舞鶴駅周辺 / 東舞鶴駅周辺）
        const searchPoints = [
            { name: '西舞鶴エリア', lat: 35.4441, lng: 135.3306 },
            { name: '東舞鶴エリア', lat: 35.4750, lng: 135.3940 },
            { name: '松尾寺・高専エリア', lat: 35.4880, lng: 135.4400 }
        ];

        let restaurantMarkers = [];
        let restaurantMarkerGroup = L.featureGroup();
        
        // =====================================================
        // 地図初期化
        // =====================================================
        const map = L.map('map', {
            center: maizuruCenter,
            zoom: 12,
            minZoom: 11,
            maxBounds: bounds,
            maxBoundsViscosity: 1.0
        });

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        restaurantMarkerGroup.addTo(map);

        // =====================================================
        // 全件取得ロジック（ページネーション対応）
        // =====================================================
        async function loadAllMaizuruShops() {
            const statusEl = document.getElementById('status');
            const loadBtn = document.getElementById('loadBtn');

            if (HOTPEPPER_API_KEY === '１１１' || !HOTPEPPER_API_KEY) {
                statusEl.innerHTML = '❌ エラー: ホットペッパーAPIキーが設定されていません。';
                statusEl.style.color = 'red';
                return;
            }

            loadBtn.disabled = true;
            statusEl.style.color = 'blue';
            clearMarkers();

            const allShops = [];
            const uniqueIds = new Set();

            try {
                // 2つの拠点それぞれで全件取得ループを実行
                for (const point of searchPoints) {
                    statusEl.innerHTML = `🔄 ${point.name}の店舗を検索中...`;
                    
                    let start = 1;
                    let availableCount = 0;
                    const countPerRequest = 100; // API最大値

                    do {
                        const apiUrl = `https://webservice.recruit.co.jp/hotpepper/gourmet/v1/?key=${HOTPEPPER_API_KEY}&lat=${point.lat}&lng=${point.lng}&range=5&format=json&count=${countPerRequest}&start=${start}`;
                        const response = await fetch(`https://corsproxy.io/?${encodeURIComponent(apiUrl)}`);
                        
                        if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                        const data = await response.json();

                        if (!data.results || !data.results.shop) break;

                        // 総ヒット数を初回ループ時に記憶
                        if (start === 1) {
                            availableCount = parseInt(data.results.results_available) || 0;
                        }

                        const shops = Array.isArray(data.results.shop) ? data.results.shop : [data.results.shop];
                        
                        shops.forEach(shop => {
                            if (shop.id && !uniqueIds.has(shop.id)) {
                                uniqueIds.add(shop.id);
                                allShops.push(shop);
                            }
                        });

                        // 次のページへ
                        start += countPerRequest;

                        // API負荷軽減のため少しウェイトを入れる
                        await new Promise(resolve => setTimeout(resolve, 300));

                    } while (start <= availableCount);
                }

                // 取得結果のプロット
                if (allShops.length === 0) {
                    statusEl.innerHTML = '⚠️ 店舗データが取得できませんでした。';
                    statusEl.style.color = 'orange';
                } else {
                    allShops.forEach(shop => {
                        if (!shop.lat || !shop.lng) return;
                        const marker = L.marker([parseFloat(shop.lat), parseFloat(shop.lng)])
                            .bindPopup(createPopupContent(shop));
                        
                        restaurantMarkerGroup.addLayer(marker);
                        restaurantMarkers.push(marker);
                    });

                    statusEl.innerHTML = `✅ 取得完了: 舞鶴市内の全飲食店 <strong>${allShops.length}</strong> 件をプロットしました。`;
                    statusEl.style.color = 'green';
                    map.fitBounds(restaurantMarkerGroup.getBounds().pad(0.1));
                }

            } catch (error) {
                console.error(error);
                statusEl.innerHTML = `❌ 通信エラーが発生しました: ${error.message}`;
                statusEl.style.color = 'red';
            } finally {
                loadBtn.disabled = false;
            }
        }

        function createPopupContent(shop) {
            let content = `<div style="width: 200px; font-size: 12px;">`;
            content += `<strong>${shop.name}</strong><br>`;
            if (shop.genre && shop.genre.name) content += `<small>ジャンル: ${shop.genre.name}</small><br>`;
            if (shop.address) content += `<small>住所: ${shop.address}</small><br>`;
            if (shop.url) content += `<a href="${shop.url}" target="_blank">詳細を見る</a>`;
            content += `</div>`;
            return content;
        }

        function clearMarkers() {
            restaurantMarkerGroup.clearLayers();
            restaurantMarkers = [];
            document.getElementById('status').innerHTML = '地図をクリアしました。';
        }
    </script>
</body>
</html>
