
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>舞鶴サイクルナビ - ルート案内</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background: #f4f4f4; }
        #map { width: 100%; height: 60vh; border-bottom: 3px solid #E91E63; }
        
        .ui-panel { padding: 15px; background: white; }
        .route-selector { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; }
        
        .card {
            min-width: 140px; padding: 12px; background: #fff; border: 2px solid #ddd;
            border-radius: 8px; cursor: pointer; text-align: center; transition: 0.3s;
        }
        .card.active { border-color: #E91E63; background: #fff0f5; }
        .card h4 { margin: 0 0 5px 0; font-size: 14px; }
        .card p { margin: 0; font-size: 11px; color: #666; }

        .info-box {
            margin-top: 15px; padding: 15px; background: #333; color: white;
            border-radius: 8px; display: flex; justify-content: space-between; align-items: center;
        }
        .info-text div { font-size: 12px; opacity: 0.8; }
        .info-text strong { font-size: 20px; }

        .btn-google {
            background: #4285F4; color: white; border: none; padding: 12px 20px;
            border-radius: 50px; font-weight: bold; cursor: pointer; text-decoration: none;
            display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-google:hover { background: #357ae8; }
        .disabled { background: #ccc !important; pointer-events: none; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui-panel">
    <h3>コースを選んでスタート</h3>
    <div class="route-selector">
        <div class="card" onclick="selectRoute('history', this)">
            <h4>歴史遺産巡り</h4>
            <p>赤れんがと海軍の歴史</p>
        </div>
        <div class="card" onclick="selectRoute('nature', this)">
            <h4>絶景シーサイド</h4>
            <p>五老山と美しい湾岸</p>
        </div>
        <div class="card" onclick="selectRoute('chill', this)">
            <h4>レトロ街歩き</h4>
            <p>吉原入江と西舞鶴散策</p>
        </div>
    </div>

    <div id="route-info" class="info-box" style="display: none;">
        <div class="info-text">
            <div>予想走行距離 / 所要時間</div>
            <span id="dist-display"><strong>0.0</strong> km</span> / 
            <span id="time-display"><strong>0</strong> 分</span>
        </div>
        <a id="google-maps-link" href="#" target="_blank" class="btn-google">ナビ開始 (Googleマップ)</a>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map = L.map('map').setView([35.4751, 135.3338], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let allSpots = [];
    let currentPolyline = null;
    let markers = [];

    // 1. ルートの定義（キーワードでスポットを抽出する簡易ロジック）
    const routePresets = {
        'history': { name: "歴史遺産巡り", keywords: ["赤れんが", "海軍", "北吸", "文庫"] },
        'nature': { name: "絶景シーサイド", keywords: ["五老山", "親海", "クレインブリッジ"] },
        'chill': { name: "レトロ街歩き", keywords: ["吉原", "桂林寺", "田辺城"] }
    };

    // 2. データの読み込み
    fetch('maizuru_spots.json')
        .then(response => response.json())
        .then(data => {
            allSpots = data;
            // 全スポットにピンを立てる
            data.forEach(spot => {
                const m = L.marker([spot.lat, spot.lng]).addTo(map).bindPopup(spot.name);
                markers.push({ id: spot.id, marker: m, data: spot });
            });
        });

    // 3. ルート選択関数
    function selectRoute(type, element) {
        // UIの更新
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        element.classList.add('active');
        
        const preset = routePresets[type];
        // キーワードに一致するスポットを抽出
        const selectedSpots = allSpots.filter(spot => 
            preset.keywords.some(k => spot.name.includes(k))
        );

        if (selectedSpots.length < 2) return;

        // 地図上の古い線を消す
        if (currentPolyline) map.removeLayer(currentPolyline);

        // 座標配列を作成
        const coords = selectedSpots.map(s => [s.lat, s.lng]);
        currentPolyline = L.polyline(coords, {color: '#E91E63', weight: 5, opacity: 0.7}).addTo(map);
        map.fitBounds(currentPolyline.getBounds(), {padding: [50, 50]});

        // 距離と時間の計算
        updateRouteStats(selectedSpots);
        
        // Googleマップリンクの生成
        updateGoogleMapsLink(selectedSpots);

        document.getElementById('route-info').style.display = 'flex';
    }

    // 4. 統計計算（距離と時間の概算）
    function updateRouteStats(spots) {
        let totalDist = 0;
        for (let i = 0; i < spots.length - 1; i++) {
            const p1 = L.latLng(spots[i].lat, spots[i].lng);
            const p2 = L.latLng(spots[i+1].lat, spots[i+1].lng);
            totalDist += p1.distanceTo(p2); // メートル単位
        }
        
        const km = (totalDist / 1000) * 1.3; // 道路の迂回係数1.3を考慮
        const speed = 12; // 時速12km（ゆっくりサイクリング）
        const minutes = Math.round((km / speed) * 60);

        document.getElementById('dist-display').innerHTML = `<strong>${km.toFixed(1)}</strong> km`;
        document.getElementById('time-display').innerHTML = `<strong>${minutes}</strong> 分`;
    }

    // 5. Googleマップ遷移URLの生成
    function updateGoogleMapsLink(spots) {
        const origin = `${spots[0].lat},${spots[0].lng}`;
        const destination = `${spots[spots.length - 1].lat},${spots[spots.length - 1].lng}`;
        
        // 経由地（最初と最後以外）を「|」で繋ぐ
        const waypoints = spots.slice(1, -1).map(s => `${s.lat},${s.lng}`).join('|');
        
        // Google Maps Direction API URL
        const baseUrl = "https://www.google.com/maps/dir/?api=1";
        const url = `${baseUrl}&origin=${origin}&destination=${destination}&waypoints=${waypoints}&travelmode=bicycling`;
        
        const linkEl = document.getElementById('google-maps-link');
        linkEl.href = url;
    }
</script>

</body>
</html>
