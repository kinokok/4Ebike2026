<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>舞鶴市限定地図</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: sans-serif;
        }
        
        #map {
            width: 100%;
            height: 600px;
            margin-top: 20px;
            border: 1px solid #ccc;
        }
        
        .search-container {
            background-color: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        
        .search-container input, .search-container select, .search-container button {
            padding: 8px 12px;
            margin-right: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        
        .search-container button {
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
            border: none;
        }
        
        .search-container button:hover {
            background-color: #45a049;
        }
        
        .info-box {
            background-color: #fff3cd;
            border: 1px solid #ffc107;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 10px;
            display: none;
        }
        
        .info-box.visible {
            display: block;
        }
        
        .leaflet-popup-content {
            font-size: 12px;
        }
    </style>
</head>
<body>

    <h1>舞鶴市の範囲に限定した地図</h1>
    <p>舞鶴市外へはスクロールやズームアウトができない設定です。</p>
    
    <div class="search-container">
        <h3>ホットペッパー範囲内検索</h3>
        <div style="margin-bottom: 8px; font-size: 13px; color: #333;">
            現在表示している地図の範囲をもとに、ホットペッパーに登録されている店舗を検索します。
            <strong>キーワードは不要</strong>です。
        </div>
        <div>
            <select id="searchGenre">
                <option value="all">--- すべての店舗 ---</option>
                <option value="meal">お食事（和・洋・中・伊・仏・麺・魚・パスタ）</option>
                <option value="alcohol_meat">お酒・肉（居酒屋・焼き鳥・焼肉）</option>
                <option value="cafe_sweets">カフェ・甘味（カフェ・スイーツ）</option>
            </select>
            <button onclick="searchRestaurants()">検索</button>
            <button onclick="clearMarkers()">クリア</button>
        </div>
        <div id="searchInfo" style="margin-top: 10px; font-size: 12px; color: #666;"></div>
        <div id="searchStatus"></div>
    </div>
    
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // =====================================================
        // 設定
        // =====================================================
        // TODO: ホットペッパーAPIのキーを入力してください
        // https://webservice.recruit.co.jp/ から取得できます
        const HOTPEPPER_API_KEY = '545ea2faea49bae3';
        
        // 舞鶴市を囲む四角形の範囲（南西と北東の座標）
        const bounds = [
            [35.28, 135.15], 
            [35.61, 135.62]
        ];
        
        // 舞鶴市の中心座標
        const maizuruCenter = [35.4751, 135.3338];
        
        // マーカーグループ管理用
        let restaurantMarkers = [];
        let restaurantMarkerGroup = L.featureGroup();
        
        // =====================================================
        // 地図の初期化
        // =====================================================
        const map = L.map('map', {
            center: maizuruCenter,
            zoom: 12,
            minZoom: 11,
            maxBounds: bounds,
            maxBoundsViscosity: 1.0
        });

        // タイルレイヤーの追加
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // マーカーグループを地図に追加
        restaurantMarkerGroup.addTo(map);

        function getRangeFromMapBounds() {
            const bounds = map.getBounds();
            const center = map.getCenter();
            const points = [
                bounds.getNorthEast(),
                bounds.getNorthWest(),
                bounds.getSouthEast(),
                bounds.getSouthWest()
            ];
            const distances = points.map(point => map.distance(center, point));
            const maxDistance = Math.max(...distances);
            const allowedRanges = [300, 500, 1000, 2000, 3000];
            const selected = allowedRanges.find(value => value >= maxDistance) || 3000;
            return {
                actual: Math.round(maxDistance),
                range: selected
            };
        }

        // =====================================================
        // ホットペッパーAPI検索関数
        // =====================================================
        async function searchRestaurants() {
            const genreSelect = document.getElementById('searchGenre');
            const genre = genreSelect.value;
            const statusEl = document.getElementById('searchStatus');
            const infoEl = document.getElementById('searchInfo');

            if (HOTPEPPER_API_KEY === 'YOUR_API_KEY_HERE' || HOTPEPPER_API_KEY === '１１１') {
                statusEl.innerHTML = '❌ エラー: ホットペッパーAPIのキーが正しく設定されていません。';
                statusEl.style.color = 'red';
                return;
            }

            statusEl.innerHTML = '🔍 検索中...';
            statusEl.style.color = 'blue';

            try {
                const center = map.getCenter();
                const lat = center.lat;
                const lng = center.lng;
                const rangeInfo = getRangeFromMapBounds();
                const range = rangeInfo.range;
                
                // 選択中のセレクトボックスのテキストをそのままラベルとして利用
                const categoryName = genreSelect.options[genreSelect.selectedIndex].text;

                infoEl.innerHTML = `📍 検索中心: ${lat.toFixed(4)}, ${lng.toFixed(4)} | カテゴリ: ${categoryName} | 使用範囲: ${range}m`;

                // ジャンルコードの対応表を変更
                const genreMap = {
                    meal: ['G004', 'G005', 'G006', 'G007', 'G013'], // 和・洋・伊仏・中・ラーメン
                    alcohol_meat: ['G001', 'G008'],                 // 居酒屋・焼肉
                    cafe_sweets: ['G014']                           // カフェ・スイーツ
                };

                const genreCodes = genre === 'all' ? [] : genreMap[genre] || [];
                const requests = [];

                if (genre === 'all') {
                    const apiUrl = `https://webservice.recruit.co.jp/hotpepper/gourmet/v1/?key=${HOTPEPPER_API_KEY}&lat=${lat}&lng=${lng}&range=${range}&format=json&count=100`;
                    requests.push(fetch(`https://corsproxy.io/?${encodeURIComponent(apiUrl)}`));
                } else {
                    genreCodes.forEach(code => {
                        const apiUrl = `https://webservice.recruit.co.jp/hotpepper/gourmet/v1/?key=${HOTPEPPER_API_KEY}&lat=${lat}&lng=${lng}&range=${range}&format=json&count=100&genre=${code}`;
                        requests.push(fetch(`https://corsproxy.io/?${encodeURIComponent(apiUrl)}`));
                    });
                }

                const responses = await Promise.all(requests);
                const dataList = await Promise.all(responses.map(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.json();
                }));

                // 既存のマーカーをクリア
                clearMarkers();
                
                const allShops = [];
                const uniqueIds = new Set();

                dataList.forEach(data => {
                    if (!data.results || !data.results.shop) {
                        return;
                    }
                    const shops = Array.isArray(data.results.shop) ? data.results.shop : [data.results.shop];
                    shops.forEach(shop => {
                        if (!shop.id || uniqueIds.has(shop.id)) {
                            return;
                        }
                        uniqueIds.add(shop.id);
                        allShops.push(shop);
                    });
                });

                if (allShops.length === 0) {
                    statusEl.innerHTML = `⚠️ 「${categoryName}」の検索結果がありません。<br>別の地図位置や表示倍率を試してください。`;
                    statusEl.style.color = 'orange';
                    return;
                }

                let addedCount = 0;

                allShops.forEach(shop => {
                    if (!shop.lat || !shop.lng) return;

                    const lat = parseFloat(shop.lat);
                    const lng = parseFloat(shop.lng);

                    const marker = L.marker([lat, lng])
                        .bindPopup(createPopupContent(shop));

                    restaurantMarkerGroup.addLayer(marker);
                    restaurantMarkers.push(marker);
                    addedCount++;
                });

                if (addedCount === 0) {
                    statusEl.innerHTML = `⚠️ 該当する店舗は見つかりませんでした。`; 
                    statusEl.style.color = 'orange';
                } else {
                    statusEl.innerHTML = `✅ 検索完了: ${addedCount}件の店舗を表示しました。`; 
                    statusEl.style.color = 'green';

                    if (restaurantMarkers.length > 0) {
                        map.fitBounds(restaurantMarkerGroup.getBounds().pad(0.1));
                    }
                }
                
            } catch (error) {
                console.error('API Error:', error);
                statusEl.innerHTML = `❌ エラー: ${error.message}`;
                statusEl.style.color = 'red';
            }
        }

        // =====================================================
        // ポップアップコンテンツ作成関数
        // =====================================================
        function createPopupContent(shop) {
            let content = `<div style="width: 200px; font-size: 12px;">`;
            content += `<strong>${shop.name}</strong><br>`;
            
            if (shop.genre && shop.genre.name) {
                content += `<small>ジャンル: ${shop.genre.name}</small><br>`;
            }
            
            if (shop.address) {
                content += `<small>住所: ${shop.address}</small><br>`;
            }
            
            if (shop.tel) {
                content += `<small>電話: ${shop.tel}</small><br>`;
            }
            
            if (shop.url) {
                content += `<a href="${shop.url}" target="_blank">詳細を見る</a>`;
            }
            
            content += `</div>`;
            return content;
        }

        // =====================================================
        // マーカークリア関数
        // =====================================================
        function clearMarkers() {
            restaurantMarkerGroup.clearLayers();
            restaurantMarkers = [];
            document.getElementById('searchStatus').innerHTML = '';
        }

        // ページ読み込み時のサンプル検索
        window.addEventListener('load', () => {
            // 初期状態では検索しない（APIキーが必要のため）
            console.log('地図が読み込まれました。上記の検索フォームから検索してください。');
        });
    </script>
</body>
</html>
